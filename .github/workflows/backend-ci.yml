name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Compile
        run: ./gradlew compileJava

      - name: Run focused tests
        run: ./gradlew test --tests "*SaleControllerExportTest" --tests "*DgiiTaxUtilsTest"
