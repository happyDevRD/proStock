# Database connection
spring.profiles.default=local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/prestockdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# Hibernate settings (JPA)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP (optional, but good practice)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File Upload (if you're using it)
storage.location=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.security.allow-swagger=true
app.security.bootstrap.username=${SECURITY_BOOTSTRAP_USERNAME:admin}
app.security.bootstrap.password=${SECURITY_BOOTSTRAP_PASSWORD:admin1234}
app.security.bootstrap.email=${SECURITY_BOOTSTRAP_EMAIL:admin@prostock.local}

# Logging (Enable for debugging)
logging.level.org.flywaydb=INFO
logging.level.org.springframework.jdbc.datasource.init=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN